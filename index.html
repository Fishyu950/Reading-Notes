  position:sticky;top:0;z-index:300;
  background:rgba(253,251,247,.92);
  backdrop-filter:blur(12px);
}
.hdr-inner{
  max-width:1080px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  height:56px;
}
.hdr-title{font-size:20px;font-weight:900;letter-spacing:3px;color:var(--text)}
/* ─── PLAYFAIR DISPLAY for English headings ─── */
h1,h2,h3,.en-heading,.card-title-en{font-family:'Outfit','Noto Sans TC', sans-serif}
.hdr-sub{font-size:12px;color:var(--textFaint);letter-spacing:3px;margin-left:12px}

/* ─── BUTTONS ─── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 17px;border-radius:20px;
  font-family:inherit;font-size:14px;font-weight:700;
  cursor:pointer;border:none;transition:all .15s;letter-spacing:.5px;
}
.btn-gold{background:#7F8162;color:#fff}
.btn-gold:hover{background:#6a6c50}
.btn-outline{background:var(--surface);color:var(--gold);border:1px solid var(--borderMd);user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.btn-outline:hover{background:var(--border)}
.btn-ghost{background:transparent;color:var(--textSoft);border:1px solid transparent;padding:6px 8px;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.btn-ghost:hover{background:var(--surface)}
.btn-back{background:none;border:none;color:var(--gold);cursor:pointer;font-size:20px;padding:0 6px 0 0;font-family:inherit}

/* ─── STATS BAR ─── */
.stats{
  display:flex;background:var(--card);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;margin-bottom:22px;
}
.stat{flex:1;text-align:center;padding:13px 8px}
.stat+.stat{border-left:1px solid var(--border)}
.stat-val{font-size:23px;font-weight:900;line-height:1}
.stat-lbl{font-size:11px;color:var(--textFaint);letter-spacing:0.15em;margin-top:4px}

/* ─── SEARCH ─── */
.search-wrap{position:relative;margin-bottom:11px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--textFaint);pointer-events:none}
.search-inp{
  width:100%;padding:10px 12px 10px 34px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  color:var(--text);font-size:15px;font-family:inherit;outline:none;
  transition:border-color .15s;
}
.search-inp:focus{border-color:var(--borderMd)}

/* ─── FILTER ROW ─── */
.filter-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;align-items:center}
.filter-label{font-size:11px;color:var(--textFaint);letter-spacing:1.5px}
.filter-sep{width:1px;height:14px;background:var(--border);margin:0 3px}
.fchip{
  font-size:13px;padding:4px 10px;border-radius:20px;cursor:pointer;
  font-family:inherit;border:1px solid var(--border);background:var(--card);
  color:var(--textFaint);transition:all .12s;user-select:none;
  display:inline-block;
}
.fchip.active{font-weight:600}
.fchip:active{transform:scale(.9)}
.result-count{font-size:12px;color:var(--textFaint);margin-bottom:14px;letter-spacing:.5px}

/* ─── TAG CHIP ─── */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  font-size:12px;padding:3px 9px;border-radius:20px;
  border:1px solid;font-family:inherit;font-weight:500;
  white-space:nowrap;line-height:1.55;user-select:none;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);
}
.chip.xs{font-size:11px;padding:2px 7px}
.chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.chip-remove{opacity:.5;font-weight:900;font-size:12px;cursor:pointer;margin-left:1px;line-height:1}
.chip-remove:hover{opacity:1}
.chip:active{transform:scale(.88)}

/* ─── CARD GRID ─── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.card-wrap{cursor:pointer;border-radius:14px;transition:transform .2s,box-shadow .2s;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.card-wrap:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(60,40,10,.1)}
.card-wrap.featured{grid-column:span 2}
.book-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;display:flex;flex-direction:column;height:100%;
}
.card-accent{height:4px}
.card-body{padding:20px 22px;flex:1;display:flex;flex-direction:column;gap:7px}
.card-body.lg{padding:26px 28px;gap:9px}
.card-badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;border:1px solid;font-family:inherit;letter-spacing:0.06em}
.card-time{font-size:11px;color:var(--textFaint);margin-left:auto}
.card-title{font-size:18px;font-weight:900;letter-spacing:1.5px;line-height:1.3;margin-bottom:0;color:var(--text)}
.card-title.lg{font-size:23px;letter-spacing:2px}
.card-author{font-size:12px;color:var(--textSoft);margin-bottom:0}
.card-cp{font-size:12px;color:var(--textMid);line-height:1.8;margin-bottom:0}
.card-atk{font-size:11px;color:var(--textFaint);line-height:1.8;margin-bottom:0}
.card-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:auto;padding-top:4px}
.card-more{font-size:11px;color:var(--textFaint);align-self:center}

/* ─── STARS ─── */
.stars{display:flex;gap:2px;align-items:center;margin-bottom:0}
.star{font-size:14px;line-height:1;cursor:default;transition:color .1s}
.star.lit{}
.star.dim{color:var(--border)}
.star-score{font-size:12px;color:var(--textSoft);font-weight:700;margin-left:5px}

/* ─── MODAL OVERLAY ─── */
.overlay{
  position:fixed;inset:0;background:rgba(20,12,4,.45);
  display:none;align-items:flex-end;justify-content:center;
  z-index:200;padding:0;backdrop-filter:blur(7px);overflow:hidden;
}
.overlay.open{display:flex}
.modal{
  position:fixed;bottom:0;left:0;right:0;height:92vh;
  background:var(--card);border:1px solid var(--borderMd);border-radius:20px 20px 0 0;
  overflow-y:scroll;-webkit-overflow-scrolling:touch;
  box-shadow:0 24px 60px rgba(20,12,4,.22);
}
.modal-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 18px 11px 26px;border-bottom:1px solid var(--border);
}
.modal-topbar-label{font-size:13px;color:var(--textSoft);letter-spacing:1.5px}
.modal-actions{display:flex;gap:7px;align-items:center}
.modal-header{
  background:linear-gradient(135deg,var(--surface),var(--card));
  padding:22px 28px 18px;border-bottom:1px solid var(--border);
}
.modal-body{padding:18px 28px}
#modal-content{}

/* ─── META BOXES ─── */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.meta-box{background:var(--surface);border-radius:10px;padding:10px 13px;border:1px solid var(--border)}
.meta-key{font-size:10px;color:var(--textFaint);letter-spacing:0.15em;margin-bottom:4px}
.meta-val{font-size:13px;color:var(--text);line-height:1.7}

/* ─── TAG PANEL ─── */
.tag-panel{padding:11px 13px;background:var(--surface);border-radius:10px;border:1px solid var(--border);margin-bottom:14px}
.tag-group-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:5px}
.tag-group-row:last-child{margin-bottom:0}
.tg-label{font-size:10px;font-weight:700;letter-spacing:0.15em;min-width:44px;flex-shrink:0}

/* ─── DIVIDER ─── */
.divider{display:flex;align-items:center;gap:0;margin:15px 0 10px}
.divider-line{display:none}
.divider-txt{font-size:11px;letter-spacing:0.15em;padding-left:11px}

/* ─── TEXT BLOCK ─── */
.text-block{
  font-size:13px;color:var(--textMid);line-height:2.05;
  border-left:2px solid var(--borderMd);padding-left:11px;
  white-space:pre-wrap;font-style:normal;margin:0;
}

/* ─── FORM ─── */
.form-wrap{
  max-width:700px;margin:0 auto;
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:26px 28px;
  box-shadow:0 4px 20px rgba(80,60,20,.06);
}
.form-title{color:var(--gold);font-size:17px;letter-spacing:2px;margin-bottom:20px;font-weight:700}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.form-lbl{font-size:11px;color:var(--textSoft);letter-spacing:0.15em;margin-bottom:5px;display:block}
.form-inp,.form-ta{
  width:100%;padding:9px 12px;
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  color:var(--text);font-size:15px;font-family:inherit;outline:none;
  line-height:1.7;transition:border-color .15s;
}
.form-inp:focus,.form-ta:focus{border-color:var(--borderMd)}
.form-ta{resize:vertical;min-height:100px}
.quote-toolbar{display:flex;gap:4px;margin-bottom:5px}
.quote-toolbar-btn{font-size:11px;padding:3px 9px;background:var(--surface);color:var(--textSoft);border:1px solid var(--border);border-radius:6px;cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;transition:background .12s,color .12s}
.quote-toolbar-btn:hover{background:var(--border);color:var(--textMid)}

/* ─── CUSTOM SELECTOR (replaces <select>) ─── */
.sel-group{display:flex;flex-wrap:wrap;gap:5px;margin-top:1px}
.sel-opt{
  padding:6px 13px;border-radius:20px;cursor:pointer;
  font-size:14px;font-family:inherit;font-weight:500;
  border:1px solid var(--border);background:var(--card);
  color:var(--textFaint);transition:all .15s;user-select:none;
  white-space:nowrap;-webkit-tap-highlight-color:transparent;
}
.sel-opt:hover{border-color:var(--borderMd);color:var(--textMid)}
.sel-opt.active{font-weight:700;border-width:1.5px}
.sel-opt:active{transform:scale(.93)}
.range-wrap{margin-top:7px}
.range-inp{width:100%;-webkit-appearance:none;appearance:none;height:4px;background:transparent;outline:none;cursor:pointer}
.range-inp::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:linear-gradient(to right,var(--sf,#697d7b) var(--sp,0%),#d0cfca var(--sp,0%))}
.range-inp::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--sf,#697d7b);margin-top:-5px;cursor:pointer}
.range-inp::-moz-range-track{height:4px;border-radius:2px;background:#d0cfca}
.range-inp::-moz-range-progress{height:4px;border-radius:2px;background:var(--sf,#697d7b)}
.range-inp::-moz-range-thumb{width:14px;height:14px;border-radius:50%;border:none;background:var(--sf,#697d7b);cursor:pointer}
.stars-preview{display:flex;gap:1px;margin-top:3px}
.star-prev{font-size:12px}

/* ─── ACCORDION ─── */
.acc-item{border-radius:9px;overflow:hidden;margin-bottom:4px}
.acc-head{
  padding:7px 12px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  user-select:none;
}
.acc-head-left{display:flex;align-items:center;gap:7px}
.acc-dot{width:7px;height:7px;border-radius:50%}
.acc-lbl{font-size:13px;font-weight:700;font-family:inherit}
.acc-count{font-size:11px;color:#fff;border-radius:10px;padding:1px 6px;font-weight:700}
.acc-arrow{font-size:11px;opacity:.5}
.acc-body{padding:9px 11px;display:none}
.acc-body.open{display:block}
.acc-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.acc-tag{
  font-size:13px;padding:3px 10px;border-radius:14px;cursor:pointer;
  font-family:inherit;border:1px solid var(--border);background:var(--surface);
  color:var(--textFaint);transition:all .12s;user-select:none;
  display:inline-flex;align-items:center;gap:4px;
}
.acc-tag.sel{font-weight:700}
.acc-tag-del{font-size:12px;cursor:pointer;opacity:.35;line-height:1;margin-left:2px;transition:opacity .1s}
.acc-tag-del:hover{opacity:1}
.acc-add-row{display:flex;gap:6px}
.acc-add-inp{
  flex:1;padding:6px 10px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:13px;font-family:inherit;outline:none;
}
.acc-add-btn{
  padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:13px;font-family:inherit;font-weight:700;border:1px solid;white-space:nowrap;
}

/* ─── SELECTED CHIPS TRAY ─── */
.chips-tray{
  display:flex;flex-wrap:wrap;gap:6px;padding:8px 11px;
  background:var(--bg);border-radius:9px;border:1px solid var(--border);margin-bottom:8px;
}

/* ─── SAVE BUTTON ─── */
.btn-save{
  flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer;
  font-size:16px;font-weight:700;font-family:inherit;letter-spacing:.5px;
  transition:background .3s,color .3s;
}
.btn-save.idle{background:#7F8162;color:#fff}
.btn-save.idle:disabled{background:#ccc;color:var(--textFaint);cursor:not-allowed}
.btn-save.saving{background:var(--surface);color:var(--textFaint);cursor:not-allowed}
.btn-save.ok{background:#2D6A4F;color:#fff;cursor:not-allowed}
.btn-save.err{background:#8C3820;color:#fff}
.btn-cancel{
  padding:12px 18px;background:var(--surface);color:var(--textMid);
  border:1px solid var(--border);border-radius:10px;cursor:pointer;
  font-size:16px;font-family:inherit;
}

/* ─── EXPORT CARD (hidden, for screenshot) ─── */
#export-card-container{
  position:absolute;left:-9999px;top:0;pointer-events:none;
}
.export-card{
  width:500px;background:#FEFEFC;font-family:'Outfit','Noto Sans TC', sans-serif;
  position:relative;overflow:hidden;border:1px solid var(--borderMd);
}
.export-footer{
  padding:9px 24px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;background:var(--surface);
  font-size:11px;color:var(--textFaint);letter-spacing:2px;
}

/* ─── EMPTY STATE ─── */
.empty{text-align:center;padding:70px 0;color:var(--textFaint)}
.empty-icon{font-size:34px;margin-bottom:10px}
.empty-txt{font-size:15px;letter-spacing:2px}

/* ─── DROPDOWN MENU ─── */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{
  position:absolute;top:calc(100% + 6px);right:0;z-index:60;
  background:var(--card);border:1px solid var(--borderMd);border-radius:12px;
  padding:5px;min-width:160px;box-shadow:0 8px 24px rgba(40,20,0,.12);
  display:none;
}
.dropdown-menu.open{display:block}
.dropdown-item{
  width:100%;padding:8px 12px;text-align:left;background:transparent;border:none;
  cursor:pointer;font-size:14px;color:var(--textMid);border-radius:7px;
  font-family:inherit;display:flex;align-items:center;gap:8px;transition:background .1s;
}
.dropdown-item:hover{background:var(--surface)}



/* ─── STATS CONFIG PANEL ─── */
.stats-wrap{position:relative;margin-bottom:22px}
.stats-edit-btn{
  position:absolute;top:50%;right:10px;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:15px;color:var(--textFaint);padding:4px 6px;border-radius:6px;
  transition:all .15s;line-height:1;
}
.stats-edit-btn:hover{background:var(--surface);color:var(--textMid)}
.stats-panel{
  display:none;background:var(--card);border:1px solid var(--borderMd);
  border-radius:14px;padding:18px 20px;margin-top:8px;
  box-shadow:0 6px 20px rgba(40,20,0,.08);
}
.stats-panel.open{display:block}
.stats-panel-title{font-size:12px;color:var(--textSoft);letter-spacing:0.15em;margin-bottom:12px}
.stats-panel-note{font-size:12px;color:var(--textFaint);margin-bottom:14px;letter-spacing:0.06em}
.stats-slots{display:flex;flex-direction:column;gap:8px}
.stats-slot{display:flex;align-items:center;gap:10px}
.stats-slot-num{
  width:20px;height:20px;border-radius:50%;background:var(--surface);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--textFaint);flex-shrink:0;
}
.sdd{position:relative;flex:1}
.sdd-trigger{
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  padding:9px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;cursor:pointer;font-size:15px;font-family:inherit;
  color:var(--text);transition:border-color .15s;user-select:none;
}
.sdd-trigger:hover{border-color:var(--borderMd)}
.sdd.open .sdd-trigger{border-color:var(--gold)}
.sdd-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdd-label.placeholder{color:var(--textFaint)}
.sdd-arrow{font-size:12px;color:var(--textFaint);transition:transform .2s;flex-shrink:0;line-height:1}
.sdd.open .sdd-arrow{transform:rotate(180deg)}
.sdd-list{
  display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--card);border:1px solid var(--borderMd);border-radius:10px;
  box-shadow:0 6px 20px rgba(40,20,0,.12);z-index:200;
  overflow:hidden;max-height:220px;overflow-y:auto;
}
.sdd.open .sdd-list{display:block}
.sdd-item{
  padding:9px 12px;font-size:15px;font-family:inherit;cursor:pointer;
  color:var(--textMid);transition:background .1s;
}
.sdd-item:hover{background:var(--surface)}
.sdd-item.active{background:var(--surface);color:var(--gold);font-weight:700}
.sdd-item.placeholder{color:var(--textFaint)}
.stats-slot-toggle{
  width:28px;height:28px;border-radius:8px;background:var(--surface);
  border:1px solid var(--border);cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .15s;color:var(--textFaint);
}
.stats-slot-toggle:hover{background:var(--border)}
.stats-slot.disabled .sdd-trigger{opacity:.4;pointer-events:none}
.stats-slot.disabled .stats-slot-num{opacity:.4}
.stats-panel-actions{display:flex;gap:8px;margin-top:14px}
.stats-apply-btn{
  flex:1;padding:9px;background:#7F8162;color:#fff;border:none;
  border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;
  font-family:inherit;letter-spacing:0.06em;
}
.stats-apply-btn:hover{background:#6a6c50}
.stats-cancel-btn{
  padding:9px 14px;background:var(--surface);color:var(--textMid);
  border:1px solid var(--border);border-radius:9px;cursor:pointer;
  font-size:14px;font-family:inherit;
}

/* ─── TAG BOTTOM SHEET (mobile) ─── */
.tag-sheet-overlay{
  position:fixed;inset:0;background:rgba(20,12,4,.4);
  z-index:500;display:none;backdrop-filter:blur(4px);
}
.tag-sheet-overlay.open{display:block}
.tag-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:501;
  background:var(--card);border-radius:20px 20px 0 0;
  border-top:1px solid var(--borderMd);
  padding:0 0 env(safe-area-inset-bottom,16px);
  max-height:75vh;display:flex;flex-direction:column;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,0,.67,0);
}
.tag-sheet.open{transform:translateY(0);transition:transform .3s cubic-bezier(.33,1,.68,1)}
.tag-sheet-handle{
  width:36px;height:4px;background:var(--border);border-radius:2px;
  margin:12px auto 0;flex-shrink:0;
}
.tag-sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 10px;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
.tag-sheet-title{font-size:15px;font-weight:700;color:var(--text);letter-spacing:1px}
.tag-sheet-close{
  background:none;border:none;font-size:22px;color:var(--textSoft);
  cursor:pointer;padding:0 4px;font-family:inherit;line-height:1;
}
.tag-sheet-body{
  overflow-y:auto;padding:14px 18px 20px;flex:1;
  -webkit-overflow-scrolling:touch;
}
.tag-sheet-tags{display:flex;flex-wrap:wrap;gap:8px}
.tag-sheet-item{
  font-size:15px;padding:7px 14px;border-radius:20px;cursor:pointer;
  font-family:inherit;border:1px solid var(--border);background:var(--surface);
  color:var(--textFaint);transition:all .12s;user-select:none;
  display:inline-flex;align-items:center;gap:5px;
}
.tag-sheet-item.sel{font-weight:700}
.tag-sheet-item:active{transform:scale(.93)}

/* ─── UTIL ─── */
.d-flex{display:flex}
.gap8{gap:8px}
.ai-center{align-items:center}
.fw{font-weight:700}
.hide{display:none!important}

/* ════════════════════════════════════════
   RWD — Mobile First (≤ 640px)
════════════════════════════════════════ */
@media (max-width: 640px) {

  /* ── layout ── */
  .container{ padding: 16px 14px; }

  /* ── header ── */
  .hdr{ padding: 0 14px; }
  .hdr-inner{ height: 50px; }
  .hdr-title{ font-size: 15px; letter-spacing: 2px; }
  .hdr-sub{ display: none; }
  .btn{ padding: 8px 14px; font-size: 12px; }

  /* ── stats ── */
  .stat-val{ font-size: 18px; }
  .stat{ padding: 11px 6px; }

  /* ── card grid: single column ── */
  .grid{ grid-template-columns: 1fr; gap: 10px; }
  .card-wrap.featured{ grid-column: span 1; }
  .card-body.lg{ padding: 16px 18px; }
  .card-title.lg{ font-size: 18px; }

  /* ── filter row: scrollable ── */
  .filter-row{
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
    gap: 6px;
  }
  .filter-row::-webkit-scrollbar{ display: none; }
  .filter-label{ flex-shrink: 0; }
  .filter-sep{ flex-shrink: 0; }
  .fchip{ flex-shrink: 0; font-size: 12px; padding: 6px 12px; }

  /* ── modal: full screen sheet ── */
  .modal{ border-bottom: none; will-change: transform; }
  .modal-topbar{ padding: 10px 14px 10px 18px; flex-wrap: wrap; gap: 6px; }
  .modal-topbar-label{ font-size: 10px; }
  .modal-actions{ gap: 5px; }
  .modal-actions .btn{ padding: 7px 10px; font-size: 11px; }
  .modal-header{ padding: 18px 18px 14px; }
  .modal-body{ padding: 14px 18px; }

  /* ── meta grid: stack ── */
  .meta-grid{ grid-template-columns: 1fr; gap: 8px; }

  /* ── form ── */
  .form-wrap{ padding: 20px 16px; border-radius: 14px; }
  .form-grid2{ grid-template-columns: 1fr; gap: 10px; }
  .form-grid4{ grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-inp, .form-sel, .form-ta{
    font-size: 16px; /* prevents iOS zoom on focus */
    padding: 11px 13px;
  }
  .form-ta{ min-height: 90px; }
  .btn-save{ padding: 14px; font-size: 15px; }
  .btn-cancel{ padding: 14px 16px; font-size: 15px; }

  /* ── accordion tags: bigger tap targets ── */
  .acc-tag{ font-size: 12px; padding: 5px 12px; }
  .acc-add-inp{ font-size: 15px; padding: 9px 11px; }
  .acc-add-btn{ font-size: 12px; padding: 9px 13px; }
  .acc-head{ padding: 10px 13px; }
  .acc-lbl{ font-size: 12px; }

  /* ── chips tray ── */
  .chip{ font-size: 11px; padding: 4px 10px; }
  .chip.xs{ font-size: 10px; padding: 3px 8px; }

  /* ── dropdown menu: wider ── */
  .dropdown-menu{ min-width: 130px; right: 0; left: auto; }

  /* ── text ── */
  .text-block{ font-size: 12px; line-height: 1.95; }
  .card-title{ font-size: 17px; }
  .card-author{ font-size: 11px; }
  .card-cp{ font-size: 11px; }
  .card-atk{ font-size: 10px; }
}

/* ════════════════════════════════════════
   RWD — Tablet (641px – 900px)
════════════════════════════════════════ */
@media (min-width: 641px) and (max-width: 900px) {
  .container{ padding: 20px 22px; }
  .hdr{ padding: 0 22px; }
  .grid{ grid-template-columns: repeat(2, 1fr); }
  .card-wrap.featured{ grid-column: span 2; }
  .form-grid4{ grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-inp, .form-sel, .form-ta{ font-size: 15px; }
}

/* ─── DESKTOP MODAL ─── */
@media (min-width: 768px) {
  .modal{
    position:fixed;
    width:680px;
    max-width:90vw;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    bottom:auto;
    right:auto;
    border-radius:20px;
    height:auto;
    max-height:85vh;
    overflow-y:auto;
  }
  .modal-drag-handle{ display:none; }
}

/* ─── TOAST ─── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);
  padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:.02em;
  color:#fff;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;
  z-index:9999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.18);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok {background:rgba(90,110,80,.92)}
#toast.err{background:rgba(140,56,32,.92)}

/* ─── FILTER BUTTON & SHEET ─── */
.btn-filter{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:13px;border:1px solid var(--border);background:var(--card);color:var(--textMid);transition:all .12s}
.btn-filter:active{transform:scale(.96)}
.filter-bar{margin-bottom:10px}
.filter-badge{font-weight:700;color:var(--text)}
.flt-section{margin-bottom:18px}
.flt-section-label{font-size:11px;color:var(--textFaint);letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}
.flt-chips{display:flex;flex-wrap:wrap;gap:8px}
.flt-clear-btn{font-size:13px;color:var(--textSoft);border:1px solid var(--border);background:none;cursor:pointer;font-family:inherit;padding:5px 12px;border-radius:20px;transition:all .12s;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
.flt-clear-btn:active{background:var(--surface)}
/* ─── MODAL DRAG HANDLE ─── */
.modal-drag-handle{display:block;width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}
/* ─── SCROLL TO TOP ─── */
#scroll-to-top{
  position:fixed;bottom:80px;right:20px;
  width:44px;height:44px;border-radius:50%;
  background:#7F8162;color:#fff;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;
  z-index:100;-webkit-tap-highlight-color:transparent;
}
#scroll-to-top.visible{opacity:1;pointer-events:auto}
/* ─── SETTINGS GEAR DROPDOWN ─── */
.settings-wrap{position:relative}
.settings-gear-btn{padding:7px 10px}
.settings-dropdown{
  display:none;position:absolute;right:0;top:calc(100% + 6px);
  background:var(--surface);border:1px solid var(--borderMd);
  border-radius:12px;box-shadow:0 4px 16px rgba(44,35,26,.12);
  min-width:168px;z-index:400;overflow:hidden;
}
.settings-dropdown.open{display:block}
.settings-item{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:10px 16px;background:none;border:none;
  font-family:inherit;font-size:14px;font-weight:600;
  color:var(--text);cursor:pointer;text-align:left;transition:background .12s;
}
.settings-item:hover{background:var(--border)}
.settings-item .material-icons-outlined{font-size:18px;color:var(--gold)}
.settings-item-sync{font-size:17px;color:var(--gold);line-height:1}
</style>

function exportData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    data[key] = localStorage.getItem(key);
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'booklist-backup.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      localStorage.clear();
      Object.entries(data).forEach(([k,v]) => localStorage.setItem(k, v));
      location.reload();
    } catch(err) { alert('JSON 格式錯誤，請確認檔案正確'); }
  };
  reader.readAsText(file);
}

/* ═══════════ HELPERS ═══════════ */
function getTagColour(tag) {
  for (const g of tagGroups) {
    const idx = g.tags.indexOf(tag);
    if (idx >= 0) {
      const levels = GRP[g.key]?.levels;
      if (!levels) return GRP.genre.levels[0];
      const lvl = Math.min(2, Math.floor((idx / Math.max(g.tags.length,1))*3));
      return levels[lvl];
    }
  }
  return GRP.genre.levels[0];
}

function getGroupHeader(key) {
  return (GRP[key]?.levels || GRP.genre.levels)[1];
}

function scoreColor(v) { // v: 1–10
  const t = (v - 1) / 9;
  return `rgb(${Math.round(105+t*86)},${Math.round(125+t*51)},${Math.round(123+t*32)})`;
}

function starsHTML(v, size=12) {
  let h = `<div class="stars">`;
  for (let i=0;i<10;i++) {
    const col = i<v ? scoreColor(i+1) : 'var(--border)';
    h += `<span class="star ${i<v?'lit':'dim'}" style="font-size:${size}px;color:${col}">★</span>`;
  }
  h += `<span class="star-score" style="font-size:${size-2}px">${v}/10</span></div>`;
  return h;
}

function chipHTML(tag, size='sm', removable=false) {
  const c = getTagColour(tag);
  const xs = size==='xs';
  return `<span class="chip ${xs?'xs':''}" style="background:${c.bg};color:${c.text};border-color:${c.border}">
    <span class="chip-dot" style="background:${c.dot}"></span>${esc(tag)}${
    removable?`<span class="chip-remove" data-tag="${esc(tag)}"><span class="material-icons-outlined">close</span></span>`:''
  }</span>`;
}

function badgeHTML(val, map) {
  const m = map[val] || {};
  return `<span class="badge" style="background:${m.bg||'#eee'};color:${m.text||'#666'};border-color:${m.border||'#ccc'}">${esc(val)}</span>`;
}

function dividerHTML(label, accentColor) {
  const a = accentColor || 'var(--borderMd)';
  return `<div class="divider">
    <div class="divider-line" style="background:linear-gradient(90deg,${a}80,transparent)"></div>
    <span class="divider-txt" style="color:${a}">${label}</span>
    <div class="divider-line" style="background:linear-gradient(270deg,${a}80,transparent)"></div>
  </div>`;
}

function textBlockHTML(content, accentColor) {
  if (!content) return '';
  const a = accentColor || 'var(--borderMd)';
  return `<p class="text-block" style="border-left-color:${a}">${esc(content).replace(/\n/g,'<br>')}</p>`;
}

function accentBarHTML(book, h=4) {

  return `<div class="card-accent" style="height:${h}px;background:linear-gradient(90deg,${sc.border} 0%,${lc.border} 60%,transparent 100%)"></div>`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getFiltered() {
  return books.filter(b => {
    if (fltSpice  && b.spice !==fltSpice)  return false;
    if (fltLength && b.length!==fltLength) return false;
    if (fltTime) {
      if (fltTime==='古代'&&b.time!=='古代') return false;
      if (fltTime==='現代'&&b.time!=='現代') return false;
      if (fltTime==='其他'&&(b.time==='古代'||b.time==='現代')) return false;
    }
    for (const [gk,tags] of Object.entries(fltTags)) {
      if (tags?.length && !tags.some(t=>b.types.includes(t))) return false;
    }
    if (searchQ) {
      const q=searchQ;
      if (!b.title.includes(q)&&!b.author.includes(q)&&(b.attackType||'').includes(q)===false&&

        if (!b.title.includes(q)&&!b.author.includes(q)&&!(b.attackType||'').includes(q)) return false;
      }
    }
    return true;
  });
}

  {id:'starred',  label:'滿分書目', fn:()=>books.filter(b=>b.stars===10).length},
  {id:'total',    label:'收錄書目', fn:()=>books.length},
  {id:'monk',     label:'和尚攻', fn:()=>books.filter(b=>b.types&&b.types.includes('和尚攻')).length},
];

const STAT_COLORS = [
  'var(--gold)',
  GRP.genre.levels[1].dot,
  GRP.relation.levels[1].dot,
  GRP.roles.levels[1].dot,
];

// default 2 slots: 收錄書目 + 和尚攻
let activeStats = ['total','monk',null,null];

function getStatBySlot(id) {
  return STAT_OPTIONS.find(o=>o.id===id);
}

function renderStats() {
  const filled = activeStats.filter(Boolean);
  const bar = document.getElementById('stats-bar');
  if (!bar) return;
  bar.innerHTML = filled.map((id,i)=>{
    const opt = getStatBySlot(id);
    if (!opt) return '';
    return `<div class="stat">
      <div class="stat-val" style="color:${STAT_COLORS[i]||'var(--gold)'}">${opt.fn()}</div>
      <div class="stat-lbl">${opt.label}</div>
    </div>`;
  }).join('');
}

function renderStatsPanel() {
  const slots = document.getElementById('stats-slots');
  if (!slots) return;
  slots.innerHTML = [0,1,2,3].map(i=>{
    const val = activeStats[i]||'';
    const disabled = i>=2 && !activeStats[i-1];
    const selOpt = STAT_OPTIONS.find(o=>o.id===val);
    const lblText = selOpt ? selOpt.label : '— 不顯示 —';
    const itemsHtml = [
      `<div class="sdd-item placeholder" data-val="">— 不顯示 —</div>`,
      ...STAT_OPTIONS.map(o=>`<div class="sdd-item${val===o.id?' active':''}" data-val="${o.id}">${o.label}</div>`)
    ].join('');
    return `<div class="stats-slot${disabled?' disabled':''}" id="stats-slot-${i}">
      <div class="stats-slot-num">${i+1}</div>
      <div class="sdd" id="sdd-${i}">
        <div class="sdd-trigger" id="sdd-trigger-${i}">
          <span class="sdd-label${val?'':' placeholder'}" id="sdd-lbl-${i}">${lblText}</span>
          <span class="sdd-arrow"><span class="material-icons-outlined">expand_more</span></span>
        </div>
        <div class="sdd-list" id="sdd-list-${i}">${itemsHtml}</div>
      </div>
      <button class="stats-slot-toggle" data-slot="${i}" title="${val?'清除':''}">
        ${val?'<span class="material-icons-outlined">close</span>':'　'}
      </button>
    </div>`;
  }).join('');
  [0,1,2,3].forEach(i=>{
    const sdd    = document.getElementById(`sdd-${i}`);
    const trigger= document.getElementById(`sdd-trigger-${i}`);
    const list   = document.getElementById(`sdd-list-${i}`);
    const lblEl  = document.getElementById(`sdd-lbl-${i}`);
    if (!trigger||!list) return;
    trigger.addEventListener('click',e=>{
      e.stopPropagation();
      document.querySelectorAll('.sdd.open').forEach(el=>{ if(el!==sdd) el.classList.remove('open'); });
      sdd.classList.toggle('open');
    });
    list.querySelectorAll('.sdd-item').forEach(item=>{
      item.addEventListener('click',()=>{
        const newVal = item.dataset.val;
        activeStats[i] = newVal||null;
        lblEl.textContent = newVal ? (STAT_OPTIONS.find(o=>o.id===newVal)||{}).label : '— 不顯示 —';
        lblEl.className = 'sdd-label'+(newVal?'':' placeholder');
        list.querySelectorAll('.sdd-item').forEach(it=>it.classList.remove('active'));
        item.classList.add('active');
        sdd.classList.remove('open');
        const clearBtn = document.querySelector(`#stats-slot-${i} .stats-slot-toggle`);
        if (clearBtn) clearBtn.innerHTML = newVal?'<span class="material-icons-outlined">close</span>':'　';
        const next = document.getElementById(`stats-slot-${i+1}`);
        if (next) {
          if (newVal) {
            next.classList.remove('disabled');
          } else {
            next.classList.add('disabled');
            activeStats[i+1]=null; activeStats[i+2]=null; activeStats[i+3]=null;
          }
        }
      });
    });
    const btn = document.querySelector(`#stats-slot-${i} .stats-slot-toggle`);
    if (btn) btn.addEventListener('click',()=>{
      activeStats[i]=null;
      if (i<3){ activeStats[i+1]=null; activeStats[i+2]=null; activeStats[i+3]=null; }
      renderStatsPanel();
    });
  });
}

function renderFilters() {
  const total = (fltSpice?1:0)+(fltLength?1:0)+(fltTime?1:0)+
    Object.values(fltTags).reduce((s,a)=>s+(a?.length||0),0);
  const badge = document.getElementById('filter-badge');
  if (badge) { badge.textContent = total ? ` ·${total}` : ''; badge.style.display = total ? '' : 'none'; }
  if (document.getElementById('filter-sheet')?.classList.contains('open')) renderFilterSheetBody();
}

function isMobile(){ return window.innerWidth <= 640; }

function openTagSheet(gk) {
  const g = tagGroups.find(x=>x.key===gk);
  if (!g) return;
  const hdr = getGroupHeader(gk);
  document.getElementById('tag-sheet-title').textContent = g.label;
  const sel = fltTags[gk]||[];
  document.getElementById('tag-sheet-tags').innerHTML = g.tags.map((t,ti)=>{
    const on = sel.includes(t);
    const levels = GRP[gk]?.levels||GRP.genre.levels;
    const lvl = Math.min(2,Math.floor((ti/Math.max(g.tags.length,1))*3));
    const tc = levels[lvl];
    return `<span class="tag-sheet-item ${on?'sel':''}" data-sgk="${esc(gk)}" data-stag="${esc(t)}"
      style="${on?`background:${tc.bg};color:${tc.text};border-color:${tc.border}`:''}">
      ${on?`<span style="width:5px;height:5px;border-radius:50%;background:${tc.dot};flex-shrink:0"></span>`:''}
      ${esc(t)}</span>`;
  }).join('');
  document.querySelectorAll('[data-sgk]').forEach(el=>{
    el.addEventListener('click',()=>{
      const sgk=el.dataset.sgk, tag=el.dataset.stag;
      const cur=fltTags[sgk]||[];
      fltTags[sgk]=cur.includes(tag)?cur.filter(x=>x!==tag):[...cur,tag];
      renderFilters(); renderGrid();
      openTagSheet(sgk); // re-render sheet with updated state
    });
  });
  document.getElementById('tag-sheet-overlay').classList.add('open');
  document.getElementById('tag-sheet').classList.add('open');
}

function closeTagSheet() {
  document.getElementById('tag-sheet-overlay').classList.remove('open');
  document.getElementById('tag-sheet').classList.remove('open');
}

function openFilterSheet() {
  if (!openFilterSheet._ready) {
    const ov = document.getElementById('filter-sheet-overlay');
    const cl = document.getElementById('filter-sheet-close');
    const ca = document.getElementById('flt-clear-all');
    const sh = document.getElementById('filter-sheet');
    if (ov) ov.addEventListener('click', closeFilterSheet);
    if (cl) cl.addEventListener('click', closeFilterSheet);
    if (ca) ca.addEventListener('click', () => {
      fltSpice=''; fltLength=''; fltTime=''; fltTags={};
      renderFilters(); renderGrid(); renderFilterSheetBody();
    });
    if (sh) {
      let _sy = 0;
      sh.addEventListener('touchstart', e => { _sy = e.touches[0].clientY; sh.style.transition='none'; }, {passive:true});
      sh.addEventListener('touchmove', e => {
        const dy = e.touches[0].clientY - _sy;
        if (dy > 0) {
          e.preventDefault();
          sh.style.transform = `translateY(${dy}px)`;
        }
      }, {passive:false});
      sh.addEventListener('touchend', e => {
        const dy = e.changedTouches[0].clientY - _sy;
        sh.style.transition = '';
        if (dy > 80) { sh.style.transform = ''; closeFilterSheet(); }
        else sh.style.transform = '';
      });
    }
    openFilterSheet._ready = true;
  }
  renderFilterSheetBody();
  document.getElementById('filter-sheet-overlay').classList.add('open');
  document.getElementById('filter-sheet').classList.add('open');
}

function closeFilterSheet() {
  document.getElementById('filter-sheet-overlay')?.classList.remove('open');
  document.getElementById('filter-sheet')?.classList.remove('open');
}

function renderFilterSheetBody() {
  const body = document.getElementById('filter-sheet-body');
  if (!body) return;
  const TC = {bg:'#76614F',text:'#fff',border:'#76614F'};
  let h = '';
  h += `<div class="flt-section"><div class="flt-section-label">肉度</div><div class="flt-chips">`;
  for (const [s,sc] of Object.entries(SPICE_MAP)) {
    const on = fltSpice===s;
    h += `<span class="tag-sheet-item${on?' sel':''}" data-ftype="spice" data-fval="${esc(s)}"
      ${on?`style="background:${sc.bg};color:${sc.text};border-color:${sc.border}"`:''}>${esc(s)}</span>`;
  }
  h += `</div></div>`;
  h += `<div class="flt-section"><div class="flt-section-label">篇幅</div><div class="flt-chips">`;
  for (const [l,lc] of Object.entries(LEN_MAP)) {
    const on = fltLength===l;
    h += `<span class="tag-sheet-item${on?' sel':''}" data-ftype="length" data-fval="${esc(l)}"
      ${on?`style="background:${lc.bg};color:${lc.text};border-color:${lc.border}"`:''}>${esc(l)}</span>`;
  }
  h += `</div></div>`;
  h += `<div class="flt-section"><div class="flt-section-label">時代</div><div class="flt-chips">`;
  ['古代','現代','其他'].forEach(t => {
    const on = fltTime===t;
    h += `<span class="tag-sheet-item${on?' sel':''}" data-ftype="time" data-fval="${esc(t)}"
      ${on?`style="background:${TC.bg};color:${TC.text};border-color:${TC.border}"`:''}>${esc(t)}</span>`;
  });
  h += `</div></div>`;
  for (const g of tagGroups) {
    const levels = GRP[g.key]?.levels||GRP.genre.levels;
    const sel = fltTags[g.key]||[];
    h += `<div class="flt-section"><div class="flt-section-label">${esc(g.label)}</div><div class="flt-chips">`;
    g.tags.forEach((t,ti) => {
      const on = sel.includes(t);
      const lvl = Math.min(2, Math.floor((ti/Math.max(g.tags.length,1))*3));
      const tc = levels[lvl];
      h += `<span class="tag-sheet-item${on?' sel':''}" data-fgroup="${g.key}" data-ftag="${esc(t)}"
        ${on?`style="background:${tc.bg};color:${tc.text};border-color:${tc.border}"`:''}>${esc(t)}</span>`;
    });
    h += `</div></div>`;
  }
  body.innerHTML = h;
  bindFilterSheetEvents();
}

function bindFilterSheetEvents() {
  const body = document.getElementById('filter-sheet-body');
  if (!body) return;
  body.querySelectorAll('[data-ftype]').forEach(el => {
    el.addEventListener('click', () => {
      const t=el.dataset.ftype, v=el.dataset.fval;
      if (t==='spice')  fltSpice  = fltSpice===v  ? '' : v;
      if (t==='length') fltLength = fltLength===v ? '' : v;
      if (t==='time')   fltTime   = fltTime===v   ? '' : v;
      renderFilters(); renderGrid(); renderFilterSheetBody();
    });
  });
  body.querySelectorAll('[data-fgroup]').forEach(el => {
    el.addEventListener('click', () => {
      const gk=el.dataset.fgroup, tag=el.dataset.ftag;
      if (!tag) return;
      const cur = fltTags[gk]||[];
      fltTags[gk] = cur.includes(tag) ? cur.filter(x=>x!==tag) : [...cur,tag];
      renderFilters(); renderGrid(); renderFilterSheetBody();
    });
  });
}

function bindFilterEvents() { /* no-op – handled in bindFilterSheetEvents */ }

function renderGrid() {
  const filtered = getFiltered();
  document.getElementById('result-count').textContent = `共 ${filtered.length} 筆`;
  const grid = document.getElementById('book-grid');
  const empty = document.getElementById('empty-state');
  if (!filtered.length) { grid.innerHTML=''; empty.classList.remove('hide'); return; }
  empty.classList.add('hide');
  grid.innerHTML = filtered.map((b,i) => {
    const featured = i===0 && filtered.length>1;
    return renderBookCardHTML(b, featured);
  }).join('');
  grid.querySelectorAll('.card-wrap').forEach(el => {
    el.addEventListener('click', () => openModal(+el.dataset.id));
  });
}

let _bodyScrollY = 0;
let _modalHistoryPushed = false;
let _formHistoryPushed = false;
let _formFromModal = false;
let _savedModalBookId = null;

function openModal(id) {
  const b = books.find(x=>x.id===id);
  if (!b) return;
  currentModalBookId = id;
  document.getElementById('modal-content').innerHTML = renderDetailHTML(b);
  document.getElementById('modal-box').style.transform = '';
  document.getElementById('modal-overlay').classList.add('open');
  _bodyScrollY = window.scrollY;
  document.body.style.overflow = 'hidden';
  document.body.style.position = 'fixed';
  document.body.style.top = `-${_bodyScrollY}px`;
  document.body.style.width = '100%';
  document.querySelector('.hdr').style.display = 'none';
  history.pushState({modal:true}, '');
  _modalHistoryPushed = true;
}
function _openModalVisual(id) {
  const b = books.find(x=>x.id===id);
  if (!b) return;
  currentModalBookId = id;
  document.getElementById('modal-content').innerHTML = renderDetailHTML(b);
  document.getElementById('modal-box').style.transform = '';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.body.style.position = 'fixed';
  document.body.style.top = `-${_bodyScrollY}px`;
  document.body.style.width = '100%';
  document.querySelector('.hdr').style.display = 'none';
  _modalHistoryPushed = true;
}
function _closeModalVisual() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.width = '';
  document.querySelector('.hdr').style.display = '';
  window.scrollTo(0, _bodyScrollY);
}
function closeModal() {
  _closeModalVisual();
  if (_modalHistoryPushed) {
    _modalHistoryPushed = false;
    history.back();
  }
}
window.addEventListener('popstate', () => {
  const formView = document.getElementById('view-form');
  const overlay  = document.getElementById('modal-overlay');
  const isFormOpen  = !formView.classList.contains('hide');
  const isModalOpen = overlay.classList.contains('open');

  if (isFormOpen) {
    _formHistoryPushed = false;
    switchView('list');
    window.scrollTo(0, 0);
    if (_formFromModal && _savedModalBookId) {
      _formFromModal = false;
      _openModalVisual(_savedModalBookId);
    }
  } else if (isModalOpen) {
    _modalHistoryPushed = false;
    _closeModalVisual();
  }
});

function showForm(book=null, fromModal=false) {
  editingId = book ? book.id : null;
  formSelectedTypes = book ? [...book.types] : [];
  _formFromModal = fromModal;
  if (fromModal) _savedModalBookId = currentModalBookId;


  document.getElementById('form-title').innerHTML = book ? '<span class="material-icons-outlined">edit</span> 編輯書單' : '<span class="material-icons-outlined">add</span> 新增書單';
  document.getElementById('f-title').value   = book?.title   || '';
  document.getElementById('f-author').value  = book?.author  || '';
  document.getElementById('f-cp').value      = book?.mainCP  || '';
  document.getElementById('f-atk').value     = book?.attackType || '';
  document.getElementById('f-synopsis').value= book?.synopsis || '';
  document.getElementById('f-review').value  = book?.review   || '';

function setSelOpt(group, val, _unused) {
  _selState[group] = val;
  document.querySelectorAll(`[data-sel="${group}"]`).forEach(el => {
    const isActive = el.dataset.val === val;
    const c = SEL_COLOURS[group]?.[val] || {};
    el.classList.toggle('active', isActive);
    if (isActive) {
      el.style.background = c.bg||'';
      el.style.color = c.text||'';
      el.style.borderColor = c.border||'';
    } else {
      el.style.background = '';
      el.style.color = '';
      el.style.borderColor = '';
    }
  });
}

  return _selState[group] || '';
}

/* Refresh only the tag list inside one accordion group — keeps it open */
function refreshAccordionGroup(gk) {
  const g = tagGroups.find(x=>x.key===gk);
  if (!g) return;
  const tagsEl = document.getElementById(`acc-tags-${gk}`);
  if (!tagsEl) return;

  const hdr = getGroupHeader(gk);
  const levels = GRP[gk]?.levels || GRP.genre.levels;

  // re-render tag list
  tagsEl.innerHTML = g.tags.map((t,ti)=>{
    const sel = formSelectedTypes.includes(t);
    const lvl = Math.min(2, Math.floor((ti/Math.max(g.tags.length,1))*3));
    const tc = levels[lvl];
    return `<div style="display:inline-flex;align-items:center;gap:2px">
      <span class="acc-tag ${sel?'sel':''}" data-gk="${gk}" data-tag="${esc(t)}"
        style="${sel?`background:${tc.bg};color:${tc.text};border-color:${tc.border}`:''}">
        ${sel?`<span style="width:5px;height:5px;border-radius:50%;background:${tc.dot}"></span>`:''}
        ${esc(t)}
      </span>
      <span class="acc-tag-del" data-delgk="${gk}" data-deltag="${esc(t)}" title="刪除此標籤"><span class="material-icons-outlined">close</span></span>
    </div>`;
  }).join('');

  // re-bind events for this group's tags
  tagsEl.querySelectorAll('[data-tag]').forEach(el=>{
    el.addEventListener('click',()=>{
      const t=el.dataset.tag;
      if (formSelectedTypes.includes(t)) formSelectedTypes=formSelectedTypes.filter(x=>x!==t);
      else formSelectedTypes.push(t);
      refreshAccordionGroup(gk);
      renderSelectedChipsTray();
    });
  });
  tagsEl.querySelectorAll('[data-delgk]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      const dgk=el.dataset.delgk, tag=el.dataset.deltag;
      tagGroups=tagGroups.map(g=>g.key===dgk?{...g,tags:g.tags.filter(t=>t!==tag)}:g);
      formSelectedTypes=formSelectedTypes.filter(t=>t!==tag);
      refreshAccordionGroup(dgk);
      renderSelectedChipsTray();
    });
  });

  // update selected count badge in header
  const countEl = document.querySelector(`#acc-head-${gk} .acc-count`);
  const selCount = formSelectedTypes.filter(t=>g.tags.includes(t)).length;
  if (countEl) {
    countEl.textContent = selCount || '';
    countEl.style.display = selCount ? '' : 'none';
  }
}

function addTagToGroup(gk, raw) {
  const v=(raw||'').trim();
  if (!v) return;
  tagGroups=tagGroups.map(g=>g.key===gk&&!g.tags.includes(v)?{...g,tags:[...g.tags,v]}:g);
  if (!formSelectedTypes.includes(v)) formSelectedTypes.push(v);
  refreshAccordionGroup(gk);
  renderSelectedChipsTray();
}

function renderSelectedChipsTray() {
  const tray=document.getElementById('selected-chips-tray');
  if (!formSelectedTypes.length){tray.classList.add('hide');return;}
  tray.classList.remove('hide');
  tray.innerHTML = formSelectedTypes.map(t=>{
    const c=getTagColour(t);
    return `<span class="chip" style="background:${c.bg};color:${c.text};border-color:${c.border}">
      <span class="chip-dot" style="background:${c.dot}"></span>${esc(t)}
      <span class="chip-remove" data-tray-tag="${esc(t)}"><span class="material-icons-outlined">close</span></span>
    </span>`;
  }).join('');
  tray.querySelectorAll('[data-tray-tag]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      formSelectedTypes=formSelectedTypes.filter(t=>t!==el.dataset.trayTag);
      // refresh all visible open groups
      tagGroups.forEach(g=>refreshAccordionGroup(g.key));
      renderSelectedChipsTray();
    });
  });
}

/* ═══════════ NOTION SYNC ═══════════ */
const WORKER = 'https://bold-brook-9296.golu850225.workers.dev';

async function syncFromNotion() {
  const syncBtn = document.getElementById('sync-btn');
  if (syncBtn) { syncBtn.disabled = true; syncBtn.textContent = '⟳ 同步中…'; }

  try {
    const res = await fetch(WORKER, { method: 'GET' });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (!data.success || !Array.isArray(data.books)) throw new Error('回傳格式錯誤');

    const notionBooks = data.books;
    const localById = {};
    books.forEach(b => { if (b.notionId) localById[b.notionId] = b; });

    books = notionBooks.map(nb => {
      const local = localById[nb.notionId];
      const typesFlat = [
        ...(nb.types['劇情類型'] || []),
        ...(nb.types['關係設定'] || []),
        ...(nb.types['攻受特質'] || []),
        ...(nb.types['虐度結局'] || []),
      ];
      return {
        id:         local?.id || Date.now() + Math.random(),
        notionId:   nb.notionId,
        title:      nb.title,
        author:     nb.author,
        time:       nb.time,
        length:     nb.length,
        spice:      nb.spice,
        stars:      nb.stars,
        mainCP:     nb.mainCP,
        attackType: nb.attackType,
        synopsis:   nb.synopsis,
        review:     nb.review,
        quote:      nb.quote,
        types:      typesFlat,
      };
    });

    saveBooks();
    renderStats(); renderFilters(); renderGrid();
    showToast('已從 Notion 同步 ' + books.length + ' 筆書目 <span class="material-icons-outlined">check</span>');
  } catch(e) {
    showToast('從 Notion 讀取失敗：' + e.message, false);
  } finally {
    if (syncBtn) { syncBtn.disabled = false; syncBtn.textContent = '⟳ 從 Notion 同步'; }
  }
}

function quoteInsert(type) {
  const ta = document.getElementById('f-quote');
  const start = ta.selectionStart;
  const end   = ta.selectionEnd;
  const val   = ta.value;
  let insert  = '';
  if (type === 'bullet') {
    insert = '• ';
  } else if (type === 'indent') {
    insert = '\n   ';
  } else if (type === 'num') {
    const before  = val.substring(0, start);
    const matches = before.match(/(\d+)\./g);
    const next    = matches ? parseInt(matches[matches.length - 1]) + 1 : 1;
    insert = next + '. ';
  }
  ta.value = val.substring(0, start) + insert + val.substring(end);
  ta.selectionStart = ta.selectionEnd = start + insert.length;
  ta.focus();
}

let _toastTimer = null;

function showToast(msg, ok=true) {
  const el = document.getElementById('toast');
  el.innerHTML = msg;
  el.className = 'show ' + (ok ? 'ok' : 'err');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

function saveBooks() {
  localStorage.setItem('books', JSON.stringify(books));
}

function buildPayload(book) {
  const typesByGroup = {};
  tagGroups.forEach(g => {
    typesByGroup[g.label] = book.types.filter(t => g.tags.includes(t));
  });
  return {
    id: book.id, title: book.title, author: book.author,
    time: book.time, length: book.length, spice: book.spice,
    stars: book.stars, mainCP: book.mainCP, attackType: book.attackType,
    synopsis: book.synopsis, review: book.review, quote: book.quote,
    types: typesByGroup,
  };
}

async function syncCreate(book) {
  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(buildPayload(book)),
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    if (data.notionId) {
      books = books.map(b => b.id === book.id ? {...b, notionId: data.notionId} : b);
      saveBooks();
    }
    showToast('已同步到 Notion <span class="material-icons-outlined">check</span>');
  } catch(e) {
    showToast('Notion 同步失敗，請稍後重試', false);
  }
}

async function syncUpdate(book) {
  if (!book.notionId) return;
  try {
    const res = await fetch(`${WORKER}/${book.notionId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(buildPayload(book)),
    });
    if (!res.ok) {
      if (res.status === 400) {
        const data = await res.json().catch(() => ({}));
        if (JSON.stringify(data).includes('archived')) {
          await syncCreate({...book, notionId: null});
          return;
        }
      }
      throw new Error(res.status);
    }
    showToast('Notion 已更新 <span class="material-icons-outlined">check</span>');
  } catch(e) {
    showToast('Notion 更新失敗，請稍後重試', false);
  }
}

async function syncDelete(notionId) {
  if (!notionId) return;
  try {
    const res = await fetch(`${WORKER}/${notionId}`, {method: 'DELETE'});
    if (!res.ok) throw new Error(res.status);
    showToast('已從 Notion 刪除 <span class="material-icons-outlined">check</span>');
  } catch(e) {
    showToast('Notion 刪除失敗，請稍後重試', false);
  }
}

function deleteBook(id) {
  const book = books.find(b => b.id === id);
  if (!book) return;
  if (!confirm(`確定要刪除《${book.title}》？`)) return;
  const notionId = book.notionId;
  books = books.filter(b => b.id !== id);
  saveBooks();
  closeModal();
  renderStats(); renderGrid(); renderFilters();
  syncDelete(notionId);
}

function handleSave() {
  const title  = document.getElementById('f-title').value.trim();
  const author = document.getElementById('f-author').value.trim();
  if (!title||!author) return;

  const existing = editingId ? books.find(b => b.id === editingId) : null;
  const book = {
    id:         editingId || Date.now(),
    notionId:   existing?.notionId || null,
    title, author,
    time:       getSelOpt('time'),
    length:     getSelOpt('length'),
    spice:      getSelOpt('spice'),
    stars:      +document.getElementById('f-stars').value,
    mainCP:     document.getElementById('f-cp').value.trim(),
    attackType: document.getElementById('f-atk').value.trim(),
    synopsis:   document.getElementById('f-synopsis').value.trim(),
    review:     document.getElementById('f-review').value.trim(),
    quote:      document.getElementById('f-quote').value.trim(),
    types:      [...formSelectedTypes],
  };

  setSaveState('saving');

  if (editingId) books = books.map(b => b.id === editingId ? book : b);
  else books = [book, ...books];

  saveBooks();
  setSaveState('ok');
  setTimeout(() => {
    renderStats(); renderGrid(); renderFilters();
    if (_formHistoryPushed) {
      _formFromModal = false;
      history.back();
    } else {
      switchView('list');
    }
  }, 900);

  if (editingId) { if (book.notionId) syncUpdate(book); else syncCreate(book); }
  else syncCreate(book);
}

const _mbox = document.getElementById('modal-box');
let _tsY = 0, _dragEnabled = false;
_mbox.addEventListener('touchstart', e => {
  if (_mbox.scrollTop > 0) { _dragEnabled = false; return; }
  _dragEnabled = true;
  _tsY = e.touches[0].clientY;
  _mbox.style.transition = 'none';
}, {passive:true});
_mbox.addEventListener('touchmove', e => {
  if (!_dragEnabled) return;
  const dy = e.touches[0].clientY - _tsY;
  if (dy > 0) {
    e.preventDefault();
    _mbox.style.transform = `translateY(${dy}px)`;
  }
}, {passive:false});
_mbox.addEventListener('touchend', e => {
  if (!_dragEnabled) return;
  const dy = e.changedTouches[0].clientY - _tsY;
  if (dy > 80) {
    _mbox.style.transition = 'transform 0.3s ease';
    _mbox.style.transform = 'translateY(100%)';
    setTimeout(() => {
      closeModal();
      _mbox.style.transform = '';
      _mbox.style.transition = '';
    }, 300);
  } else {
    _mbox.style.transition = 'transform 0.3s ease';
    _mbox.style.transform = '';
    setTimeout(() => { _mbox.style.transition = ''; }, 300);
  }
});
// scroll to top button visibility
window.addEventListener('scroll', () => {
  document.getElementById('scroll-to-top').classList.toggle('visible', window.scrollY > 300);
}, {passive:true});
// close dropdown on outside click
document.addEventListener('click',()=>{
  document.querySelectorAll('.dropdown-menu.open,.sdd.open,.settings-dropdown.open').forEach(m=>m.classList.remove('open'));
});

function toggleSettingsMenu(e){e.stopPropagation();document.getElementById('settings-dropdown').classList.toggle('open');}
function closeSettingsMenu(){document.getElementById('settings-dropdown').classList.remove('open');}

// stats panel events
document.getElementById('stats-edit-btn').addEventListener('click',(e)=>{
  e.stopPropagation();
  renderStatsPanel();
  document.getElementById('stats-panel').classList.toggle('open');
});
document.getElementById('stats-apply-btn').addEventListener('click',()=>{
  // validate: at least 2 filled
  const filled = activeStats.filter(Boolean);
  if (filled.length < 2) {
    alert('請至少選擇 2 個統計項目');
    return;
  }
  renderStats();
  document.getElementById('stats-panel').classList.remove('open');
});
document.getElementById('stats-cancel-btn').addEventListener('click',()=>{
  document.getElementById('stats-panel').classList.remove('open');
});

document.getElementById('btn-filter-sheet').addEventListener('click', openFilterSheet);

// initial render
renderStats();
renderFilters();
renderGrid();
updateStarsPreview();
renderTagAccordion();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/Reading-Notes/sw.js');
}
</script>
